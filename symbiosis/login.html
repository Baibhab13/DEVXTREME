<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- <script type="module" src="fire-base.js" defer></script> -->
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        <div class="form-box login">
            <form action="">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt' ></i>
                </div>
                <div class="forget-link">
                    <a href="#">Forget Password ?</a>
                </div>
                <!-- link here dear -->
                <button type="submit" class="btn"> <a href="main.html">Login</a></button> 
            </form>
        </div>


        <div class="form-box register">
            <form action="">

                <h1>Registration</h1>
                <div>
                    <select name="profession" id="profession" required>
                        <option value="">Chose Your Profession</option>
                        <option value="1">Teacher</option>
                        <option value="2">Student</option>
                        <option value="3">Organization</option>
                    </select>
                    <select name="college-name" id="college-name" required>
                        <option value="">Chose Your Colllege Name</option>
                        <option value="1">PMEC</option>
                        <option value="2">OUTR</option>
                        <option value="3">VSSUT</option>
                    </select>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="College Id" id="email" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" id="password" required>
                    <i class='bx bxs-lock-alt' ></i>
                </div>
                <button id="submitSignUp" type="submit" class="btn">Register</button>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, welcome!</h1>
                <p>Don't have an account ?</p>
                <button class="btn register-btn">Register</button>
            </div>
            <div class="toggle-panel toggle-right" >
                <h1>Welcome Back!</h1>
                <p>Aready have an Account ?</p>
                <button class="btn login-btn" >Login</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="particles.js"></script>
    <script src="app.js"></script>

</body>
</html>
